<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ECHO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #000000;
    --surface: #0a0a0a;
    --card: #111111;
    --border: #1e1e1e;
    --accent: #e040fb;
    --accent2: #7c4dff;
    --text: #f5f5f5;
    --muted: #666;
    --header-h: 56px;
    --footer-h: 64px;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    height: 100%;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--header-h);
    z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #e040fb, #7c4dff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    user-select: none;
  }

  .header-icons { display: flex; gap: 18px; }
  .header-icons svg { width: 22px; height: 22px; fill: none; stroke: var(--text); stroke-width: 1.8; stroke-linecap: round; cursor: pointer; opacity: 0.8; transition: opacity .2s; }
  .header-icons svg:hover { opacity: 1; }

  /* ── FEED ── */
  #feed {
    padding-top: calc(var(--header-h) + 12px);
    padding-bottom: calc(var(--footer-h) + 16px);
    max-width: 480px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  /* ── POST CARD ── */
  .post {
    background: var(--surface);
    border-radius: 0;
    overflow: hidden;
    animation: fadeUp .4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .post-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
  }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
  }

  .post-user { font-size: 13.5px; font-weight: 600; }
  .post-time { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .post-media {
    width: 100%;
    aspect-ratio: 9 / 16;
    background: #0d0d0d;
    position: relative;
    overflow: hidden;
  }

  .post-media video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .post-media .play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.25);
    opacity: 0;
    transition: opacity .2s;
    cursor: pointer;
  }
  .post-media:hover .play-overlay { opacity: 1; }
  .play-overlay svg { width: 52px; height: 52px; fill: rgba(255,255,255,.85); }

  .post-actions {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 14px 6px;
  }

  .action-btn {
    background: none; border: none; cursor: pointer;
    display: flex; align-items: center; gap: 5px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    transition: transform .15s, color .15s;
    padding: 0;
  }
  .action-btn:active { transform: scale(.9); }
  .action-btn.liked svg { stroke: #ff4d6d; fill: #ff4d6d; }
  .action-btn svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; }
  .action-btn span { font-size: 12px; color: var(--muted); }

  .post-caption {
    padding: 4px 14px 14px;
    font-size: 13.5px;
    line-height: 1.5;
    color: #ccc;
  }
  .post-caption strong { color: var(--text); margin-right: 4px; }

  /* ── EMPTY / LOADING ── */
  #loading, #empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
    gap: 14px;
    color: var(--muted);
    font-size: 14px;
  }

  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ── */
  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--footer-h);
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 10px;
    z-index: 100;
  }

  .nav-btn {
    background: none; border: none; cursor: pointer;
    display: flex; flex-direction: column; align-items: center;
    gap: 3px; color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 10px; transition: color .2s;
    padding: 6px 14px;
  }
  .nav-btn:hover, .nav-btn.active { color: var(--text); }
  .nav-btn svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; }

  .upload-btn {
    width: 48px; height: 48px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(224, 64, 251, 0.45);
    transition: transform .2s, box-shadow .2s;
  }
  .upload-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(224,64,251,.6); }
  .upload-btn:active { transform: scale(.95); }
  .upload-btn svg { width: 22px; height: 22px; stroke: #fff; stroke-width: 2.5; fill: none; stroke-linecap: round; }

  /* ── UPLOAD MODAL ── */
  #modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.65);
    backdrop-filter: blur(6px);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  #modal-overlay.open { display: flex; }

  #modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 20px 20px 36px;
    transform: translateY(100%);
    transition: transform .35s cubic-bezier(.25,.8,.25,1);
    border-top: 1px solid var(--border);
  }
  #modal-overlay.open #modal { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }

  .field input, .field textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 11px 13px;
    outline: none;
    transition: border-color .2s;
    resize: none;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }

  .file-drop {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
    overflow: hidden;
  }
  .file-drop:hover, .file-drop.drag { border-color: var(--accent); background: rgba(224,64,251,.04); }
  .file-drop input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .file-drop .drop-icon { font-size: 28px; margin-bottom: 8px; }
  .file-drop p { font-size: 13px; color: var(--muted); }
  .file-drop strong { color: var(--accent); }
  #file-name { font-size: 12px; color: var(--accent); margin-top: 8px; display: none; }

  /* progress */
  #progress-wrap { display: none; margin-top: 14px; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .progress-bar-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width .1s; }

  .submit-btn {
    width: 100%; margin-top: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px;
    color: #fff; font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 600;
    padding: 14px;
    cursor: pointer;
    transition: opacity .2s, transform .15s;
  }
  .submit-btn:hover { opacity: .9; }
  .submit-btn:active { transform: scale(.98); }
  .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: calc(var(--footer-h) + 12px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e1e1e;
    color: var(--text);
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 100px;
    border: 1px solid var(--border);
    opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 300;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── DESKTOP ── */
  @media(min-width: 600px) {
    #feed { padding-left: 0; padding-right: 0; }
    .post { border-radius: 12px; border: 1px solid var(--border); }
    #feed { gap: 14px; padding-top: calc(var(--header-h) + 24px); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <span class="logo">ECHO</span>
  <div class="header-icons">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
    <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
  </div>
</header>

<!-- FEED -->
<main id="feed">
  <div id="loading"><div class="spinner"></div><span>Loading feed…</span></div>
</main>

<!-- FOOTER -->
<footer>
  <button class="nav-btn active" title="Home">
    <svg viewBox="0 0 24 24"><path d="M3 9L12 2l9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span>Home</span>
  </button>
  <button class="nav-btn" title="Discover">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
    <span>Discover</span>
  </button>
  <button class="upload-btn" id="open-modal" title="Upload">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <button class="nav-btn" title="Activity">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    <span>Activity</span>
  </button>
  <button class="nav-btn" title="Profile">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Profile</span>
  </button>
</footer>

<!-- UPLOAD MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">New Echo</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="inp-user" placeholder="@yourname" autocomplete="off" />
    </div>

    <div class="field">
      <label>Caption</label>
      <textarea id="inp-caption" rows="2" placeholder="Say something…"></textarea>
    </div>

    <div class="field">
      <label>Video</label>
      <div class="file-drop" id="drop-zone">
        <input type="file" id="inp-file" accept="video/*" />
        <div class="drop-icon">🎬</div>
        <p><strong>Tap to choose</strong> or drag a video here</p>
        <p id="file-name"></p>
      </div>
    </div>

    <div id="progress-wrap">
      <div class="progress-label"><span id="prog-status">Uploading…</span><span id="prog-pct">0%</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="prog-fill"></div></div>
    </div>

    <button class="submit-btn" id="submit-btn">Post Echo</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── Supabase ──────────────────────────────────────────────
const { createClient } = supabase;
const sb = createClient(
  'https://fgagzbmgqyrkvnoizcvz.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnYWd6Ym1ncXlya3Zub2l6Y3Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMTExNjQsImV4cCI6MjA5Mzg4NzE2NH0.Z0IvSf_7T7mgPeAUECgVpaytvSxGjgLlDQ2p6aEwV6M'
);

// ── Cloudinary config ─────────────────────────────────────
const CLD_CLOUD  = 'doeibrv7f';
const CLD_PRESET = 'unsigned_upload';

// ── DOM refs ──────────────────────────────────────────────
const feed       = document.getElementById('feed');
const modalOv    = document.getElementById('modal-overlay');
const openBtn    = document.getElementById('open-modal');
const submitBtn  = document.getElementById('submit-btn');
const inpUser    = document.getElementById('inp-user');
const inpCap     = document.getElementById('inp-caption');
const inpFile    = document.getElementById('inp-file');
const fileName   = document.getElementById('file-name');
const dropZone   = document.getElementById('drop-zone');
const progWrap   = document.getElementById('progress-wrap');
const progFill   = document.getElementById('prog-fill');
const progPct    = document.getElementById('prog-pct');
const progStatus = document.getElementById('prog-status');
const toast      = document.getElementById('toast');

// ── Toast helper ──────────────────────────────────────────
function showToast(msg, dur = 2800) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), dur);
}

// ── Time helper ───────────────────────────────────────────
function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  if (s < 86400) return `${Math.floor(s/3600)}h ago`;
  return `${Math.floor(s/86400)}d ago`;
}

// ── Build a post card ─────────────────────────────────────
function buildPost(p) {
  const div = document.createElement('div');
  div.className = 'post';
  const initial = (p.username || 'U')[0].toUpperCase();
  const ts = p.created_at ? timeAgo(p.created_at) : '';

  div.innerHTML = `
    <div class="post-header">
      <div class="avatar">${initial}</div>
      <div>
        <div class="post-user">${escHtml(p.username || 'anonymous')}</div>
        <div class="post-time">${ts}</div>
      </div>
    </div>
    <div class="post-media">
      <video src="${escHtml(p.media_url)}" muted loop playsinline preload="metadata"></video>
      <div class="play-overlay">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
    </div>
    <div class="post-actions">
      <button class="action-btn like-btn" title="Like">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        <span class="like-count">0</span>
      </button>
      <button class="action-btn" title="Comment">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <span>Reply</span>
      </button>
      <button class="action-btn" title="Share">
        <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        <span>Share</span>
      </button>
    </div>
    <div class="post-caption"><strong>${escHtml(p.username || 'anonymous')}</strong>${escHtml(p.caption || '')}</div>
  `;

  // Like toggle (local only, optimistic)
  const likeBtn = div.querySelector('.like-btn');
  const likeCount = div.querySelector('.like-count');
  let likes = 0, liked = false;
  likeBtn.addEventListener('click', () => {
    liked = !liked;
    likes = liked ? likes + 1 : likes - 1;
    likeCount.textContent = likes;
    likeBtn.classList.toggle('liked', liked);
  });

  // Play overlay toggle
  const vid = div.querySelector('video');
  const overlay = div.querySelector('.play-overlay');
  overlay.addEventListener('click', () => {
    vid.paused ? vid.play() : vid.pause();
  });

  return div;
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── IntersectionObserver for autoplay ─────────────────────
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    const vid = e.target;
    if (e.isIntersecting) { vid.play().catch(()=>{}); }
    else { vid.pause(); }
  });
}, { threshold: 0.55 });

function observeVideos() {
  document.querySelectorAll('.post video').forEach(v => io.observe(v));
}

// ── Load feed ─────────────────────────────────────────────
async function loadFeed() {
  feed.innerHTML = '<div id="loading"><div class="spinner"></div><span>Loading feed…</span></div>';
  try {
    const { data, error } = await sb
      .from('posts')
      .select('*')
      .order('created_at', { ascending: false });

    feed.innerHTML = '';

    if (error) throw error;
    if (!data || data.length === 0) {
      feed.innerHTML = '<div id="empty"><span style="font-size:36px">🎬</span><span>No echoes yet. Be the first!</span></div>';
      return;
    }
    data.forEach(p => feed.appendChild(buildPost(p)));
    observeVideos();
  } catch (err) {
    console.error(err);
    feed.innerHTML = `<div id="empty"><span style="font-size:32px">⚠️</span><span>Could not load feed.<br>Check your connection.</span></div>`;
  }
}
loadFeed();

// ── Modal open/close ──────────────────────────────────────
openBtn.addEventListener('click', () => { modalOv.classList.add('open'); });
modalOv.addEventListener('click', (e) => { if (e.target === modalOv) closeModal(); });

function closeModal() {
  modalOv.classList.remove('open');
  progWrap.style.display = 'none';
  progFill.style.width = '0%';
  progPct.textContent = '0%';
  inpUser.value = '';
  inpCap.value = '';
  inpFile.value = '';
  fileName.style.display = 'none';
  fileName.textContent = '';
  submitBtn.disabled = false;
  submitBtn.textContent = 'Post Echo';
}

// ── File selection ────────────────────────────────────────
inpFile.addEventListener('change', () => {
  const f = inpFile.files[0];
  if (f) {
    fileName.textContent = `📹 ${f.name}`;
    fileName.style.display = 'block';
  }
});

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag');
  const files = e.dataTransfer.files;
  if (files.length) {
    const dt = new DataTransfer();
    dt.items.add(files[0]);
    inpFile.files = dt.files;
    fileName.textContent = `📹 ${files[0].name}`;
    fileName.style.display = 'block';
  }
});

// ── Upload to Cloudinary via XHR ──────────────────────────
function uploadToCloudinary(file) {
  return new Promise((resolve, reject) => {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLD_PRESET);
    formData.append('resource_type', 'video');

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLD_CLOUD}/video/upload`);

    progWrap.style.display = 'block';
    progStatus.textContent = 'Uploading video…';

    xhr.upload.addEventListener('progress', e => {
      if (e.lengthComputable) {
        const pct = Math.round((e.loaded / e.total) * 100);
        progFill.style.width = pct + '%';
        progPct.textContent = pct + '%';
      }
    });

    xhr.addEventListener('load', () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        const res = JSON.parse(xhr.responseText);
        progStatus.textContent = 'Upload complete!';
        resolve(res.secure_url);
      } else {
        reject(new Error('Cloudinary upload failed: ' + xhr.status));
      }
    });

    xhr.addEventListener('error', () => reject(new Error('Network error during upload')));
    xhr.send(formData);
  });
}

// ── Submit post ───────────────────────────────────────────
submitBtn.addEventListener('click', async () => {
  const username = inpUser.value.trim();
  const caption  = inpCap.value.trim();
  const file     = inpFile.files[0];

  if (!username) { showToast('Please enter a username'); inpUser.focus(); return; }
  if (!file)     { showToast('Please select a video');   return; }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Posting…';

  try {
    // 1. Upload video
    const mediaUrl = await uploadToCloudinary(file);

    // 2. Save to Supabase
    progStatus.textContent = 'Saving to feed…';
    const { error } = await sb.from('posts').insert([{ username, caption, media_url: mediaUrl }]);
    if (error) throw error;

    showToast('🎉 Echo posted!');
    closeModal();
    await loadFeed();
  } catch (err) {
    console.error(err);
    showToast('❌ ' + (err.message || 'Something went wrong'));
    submitBtn.disabled = false;
    submitBtn.textContent = 'Post Echo';
  }
});
</script>
