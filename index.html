<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo | Only the 50</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --ig-blue: #0095f6; --bg: #000; --card: #121212; }
        body { background: var(--bg); color: white; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 70px; }
        
        /* Nav */
        header { position: sticky; top: 0; background: var(--bg); padding: 15px; border-bottom: 1px solid #262626; text-align: center; z-index: 10; }
        header h1 { font-style: italic; font-size: 24px; margin: 0; }

        /* Feed */
        .feed { max-width: 470px; margin: auto; }
        .post { border-bottom: 1px solid #262626; margin-bottom: 15px; }
        .post-user { padding: 12px; font-weight: 600; font-size: 14px; }
        video { width: 100%; max-height: 580px; background: #000; }
        .post-actions { padding: 12px; }
        .caption { font-size: 14px; padding: 0 12px 15px; }

        /* Upload UI */
        .upload-card { background: var(--card); border: 1px solid #262626; border-radius: 8px; margin: 10px; padding: 15px; display: none; }
        #progress-container { width: 100%; background: #262626; height: 5px; border-radius: 5px; margin: 10px 0; display: none; }
        #progress-bar { width: 0%; background: var(--ig-blue); height: 100%; border-radius: 5px; transition: width 0.3s; }
        
        input, button { width: 100%; padding: 10px; margin: 5px 0; border-radius: 4px; border: 1px solid #363636; background: #262626; color: white; }
        .share-btn { background: var(--ig-blue); border: none; font-weight: 600; cursor: pointer; }

        /* Bottom Bar */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg); border-top: 1px solid #262626; display: flex; justify-content: center; padding: 15px; }
        .add-btn { background: white; color: black; border-radius: 50%; width: 40px; height: 40px; border: none; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>

<header><h1>Echo</h1></header>

<div class="upload-card" id="upload-box">
    <input type="text" id="username" placeholder="Username...">
    <input type="text" id="caption" placeholder="Caption...">
    <input type="file" id="file-input" accept="video/*">
    <div id="progress-container"><div id="progress-bar"></div></div>
    <div id="status-text" style="font-size: 12px; color: #8e8e8e; text-align: center;"></div>
    <button class="share-btn" id="upload-btn" onclick="uploadVideo()">Share</button>
</div>

<div class="feed" id="feed"></div>

<div class="bottom-nav">
    <button class="add-btn" onclick="toggleUpload()">+</button>
</div>

<script>
    const SB_URL = "https://fgagzbmgqyrkvnoizcvz.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnYWd6Ym1ncXlya3Zub2l6Y3Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMTExNjQsImV4cCI6MjA5Mzg4NzE2NH0.Z0IvSf_7T7mgPeAUECgVpaytvSxGjgLlDQ2p6aEwV6M";
    const CLOUD_NAME = "doeibrv7f";
    const UPLOAD_PRESET = "unsigned_upload";

    const supabase = supabase.createClient(SB_URL, SB_KEY);

    function toggleUpload() {
        const box = document.getElementById('upload-box');
        box.style.display = box.style.display === 'block' ? 'none' : 'block';
    }

    async function uploadVideo() {
        const file = document.getElementById('file-input').files[0];
        const user = document.getElementById('username').value;
        const cap = document.getElementById('caption').value;
        const bar = document.getElementById('progress-bar');
        const container = document.getElementById('progress-container');
        const status = document.getElementById('status-text');

        if (!file || !user) return alert("Fill all fields!");

        container.style.display = 'block';
        status.innerText = "Sending to Cloudinary...";

        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', UPLOAD_PRESET);

        // Upload with Progress using XMLHttpRequest
        const xhr = new XMLHttpRequest();
        xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, true);

        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                const percent = Math.round((e.loaded / e.total) * 100);
                bar.style.width = percent + '%';
                status.innerText = `Uploading: ${percent}%`;
            }
        };

        xhr.onload = async function() {
            const res = JSON.parse(xhr.responseText);
            status.innerText = "Saving to Echo Database...";
            
            const { error } = await supabase.from('posts').insert([
                { username: user, caption: cap, media_url: res.secure_url }
            ]);

            if (error) {
                alert("Supabase Error: Check RLS Policies!");
                console.error(error);
            } else {
                location.reload();
            }
        };

        xhr.send(formData);
    }

    async function loadFeed() {
        const { data } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
        const feed = document.getElementById('feed');
        data.forEach(p => {
            feed.innerHTML += `
                <div class="post">
                    <div class="post-user">@${p.username}</div>
                    <video src="${p.media_url}" autoplay muted loop playsinline></video>
                    <div class="post-actions">❤️ 💬 ✈️</div>
                    <div class="caption"><b>@${p.username}</b> ${p.caption}</div>
                </div>`;
        });
    }
    loadFeed();
</script>
</body>
</html>
