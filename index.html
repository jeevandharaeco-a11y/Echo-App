<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHO | Only the 50</title>
    <!-- Supabase Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 80px; }
        header { position: sticky; top: 0; background: rgba(0,0,0,0.9); padding: 15px; border-bottom: 1px solid #222; text-align: center; z-index: 100; }
        .feed { max-width: 500px; margin: 0 auto; padding: 10px; }
        .post { background: #000; border: 1px solid #1a1a1a; margin-bottom: 25px; border-radius: 12px; overflow: hidden; }
        .post-header { padding: 12px; font-weight: bold; font-size: 14px; }
        video { width: 100%; aspect-ratio: 9/16; background: #111; object-fit: cover; }
        .post-content { padding: 12px; }
        .caption { font-size: 14px; margin-top: 5px; color: #efefef; }
        
        /* Floating Upload Button */
        .upload-trigger { position: fixed; bottom: 20px; right: 20px; background: #0095f6; color: white; 
                           padding: 15px 25px; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        /* Simple Modal for Upload */
        #upload-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 200; justify-content: center; align-items: center; }
        .modal-content { background: #1c1c1c; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #262626; border: 1px solid #363636; color: white; border-radius: 5px; box-sizing: border-box; }
        .post-btn { width: 100%; padding: 12px; background: #0095f6; border: none; color: white; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h2 style="margin:0; letter-spacing: 2px;">ECHO</h2>
        <span style="font-size: 12px; color: #8e8e8e;">ONLY THE 50</span>
    </header>

    <div class="feed" id="feed">
        <!-- Posts will load here -->
    </div>

    <div class="upload-trigger" onclick="document.getElementById('upload-modal').style.display='flex'">+ New Post</div>

    <div id="upload-modal">
        <div class="modal-content">
            <h3 style="margin-top:0">Share to Echo</h3>
            <input type="text" id="username" placeholder="Your Username">
            <input type="text" id="caption" placeholder="Write a caption...">
            <input type="file" id="file-input" accept="video/mp4,video/quicktime,image/*">
            <button class="post-btn" id="submit-btn" onclick="handleUpload()">Share Reel</button>
            <button class="post-btn" style="background:#333" onclick="document.getElementById('upload-modal').style.display='none'">Cancel</button>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const SB_URL = "https://fgagzbmgqyrkvnoizcvz.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZnYWd6Ym1ncXlya3Zub2l6Y3Z6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMTExNjQsImV4cCI6MjA5Mzg4NzE2NH0.Z0IvSf_7T7mgPeAUECgVpaytvSxGjgLlDQ2p6aEwV6M";
        const CLOUD_NAME = "doeibrv7f";
        const UPLOAD_PRESET = "unsigned_upload";

        const supabase = supabase.createClient(SB_URL, SB_KEY);

        // 1. Fetch Posts from Supabase
        async function loadPosts() {
            const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            if (error) return console.log(error);
            
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            data.forEach(post => {
                const postEl = document.createElement('div');
                postEl.className = 'post';
                postEl.innerHTML = `
                    <div class="post-header">@${post.username}</div>
                    <video src="${post.media_url}" controls loop muted playsinline></video>
                    <div class="post-content">
                        <div class="caption"><b>@${post.username}</b> ${post.caption}</div>
                    </div>
                `;
                feed.appendChild(postEl);
            });
        }

        // 2. Handle Video Upload
        async function handleUpload() {
            const file = document.getElementById('file-input').files[0];
            const user = document.getElementById('username').value;
            const caption = document.getElementById('caption').value;
            const btn = document.getElementById('submit-btn');

            if (!file || !user) return alert("Fill in username and pick a video!");
            
            btn.innerText = "Uploading...";
            btn.disabled = true;

            try {
                // Upload to Cloudinary
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);

                const clRes = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                    method: 'POST',
                    body: formData
                });
                const clData = await clRes.json();
                
                // Save to Supabase
                const { error } = await supabase.from('posts').insert([
                    { username: user, caption: caption, media_url: clData.secure_url }
                ]);

                if (error) throw error;
                
                location.reload(); // Refresh to see new post
            } catch (err) {
                alert("Error uploading: " + err.message);
                btn.innerText = "Share Reel";
                btn.disabled = false;
            }
        }

        // Initial Load
        loadPosts();
    </script>
</body>
</html>
